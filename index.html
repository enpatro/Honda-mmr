<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Honda MMR - Realtime</title>
<style>
:root{--bg:#0b1220;--card:#0f172a;--ink:#e5e7eb;--muted:#9ca3af;--line:#24344f;--blue:#60a5fa;--green:#22c55e;--red:#ef4444;--wa:#0b141a;--wa2:#111b21;--bubble:#202c33;--out:#005c4b}
*{box-sizing:border-box}body{font:14px/1.45 Segoe UI,Arial,sans-serif;background:radial-gradient(900px 500px at 0 0,rgba(96,165,250,.18),transparent 60%),var(--bg);color:var(--ink);margin:0;padding:16px}h1,h2,h3{margin-top:0}a{color:#93c5fd}.card,.toolbar{background:rgba(15,23,42,.9);border:1px solid var(--line);border-radius:14px;padding:14px;margin:12px 0;box-shadow:0 10px 30px rgba(0,0,0,.22)}input,select,textarea,button{padding:9px;border-radius:9px;border:1px solid var(--line);background:#111827;color:var(--ink);margin:4px}button{cursor:pointer}button.pri{background:var(--blue);color:#06101f;font-weight:900}button.ok{background:var(--green);color:#052e16;font-weight:900}button.warn{background:var(--red);color:#fff;font-weight:900}.muted,.status{font-size:12px;color:var(--muted)}table{width:100%;border-collapse:collapse;margin-top:10px}th,td{padding:8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{background:#162033;position:sticky;top:0}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:10px}.s3{grid-column:span 3}.s4{grid-column:span 4}.s6{grid-column:span 6}.s12{grid-column:1/-1}@media(max-width:900px){.s3,.s4,.s6{grid-column:1/-1}}.tabs{display:flex;gap:8px;overflow-x:auto;white-space:nowrap;margin:10px 0}.tab{flex:0 0 auto;border-radius:999px;background:rgba(255,255,255,.05)}.tab[aria-selected=true]{background:linear-gradient(90deg,#60a5fa,#22d3ee);color:#06101f;font-weight:900}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px}.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:2px 8px;color:var(--muted)}pre{white-space:pre-wrap;max-height:300px;overflow:auto}.chip{border-radius:999px}.chip.green{background:#22c55e;color:#06220f}.chip.blue{background:linear-gradient(90deg,#60a5fa,#a78bfa);color:#06101f}.chip.red{background:linear-gradient(90deg,#ef4444,#b91c1c);color:#fff}#chat-wrap{background:var(--wa2);border:1px solid #1f2c33;border-radius:16px;overflow:hidden}#chat-body{min-height:330px;max-height:520px;overflow:auto;padding:14px;background:radial-gradient(900px 500px at 10% 0,rgba(0,92,75,.28),transparent 60%),var(--wa)}.chat-row{display:flex;margin:10px 0}.chat-row.user{justify-content:flex-end}.chat-row.bot{justify-content:flex-start}.bubble{max-width:min(900px,92%);border-radius:16px;padding:10px 12px;border:1px solid rgba(255,255,255,.1);color:#e9edef}.bubble.user{background:var(--out)}.bubble.bot{background:var(--bubble)}.bubble-meta{display:flex;justify-content:space-between;gap:20px;color:#8696a0;font-size:11px;margin-top:6px}
</style>
</head>
<body>
<h1>Honda MMR - Realtime</h1>
<p><a href="admin.html">Admin Control</a></p>
<div class="card">
  <b>Login</b><br>
  <input id="email" placeholder="Email" value="e.patro@honda.hmsi.in">
  <input id="password" type="password" placeholder="Password">
  <button id="login" class="pri">Login</button>
  <button id="logout">Logout</button>
  <button id="reset" class="ok">Forgot Password</button>
  <span id="who" class="status">Not signed in</span>
</div>
<nav class="tabs" role="tablist">
  <button class="tab" role="tab" data-tab="dashboard" aria-selected="true">Dashboard</button>
  <button class="tab" role="tab" data-tab="machines">Machines</button>
  <button class="tab" role="tab" data-tab="parts">Parts</button>
  <button class="tab" role="tab" data-tab="history">History Entry</button>
  <button class="tab" role="tab" data-tab="schedule">Schedule</button>
  <button class="tab" role="tab" data-tab="chat">Smart Chat</button>
  <button class="tab" role="tab" data-tab="backup">Backup / Upload</button>
</nav>
<main>
<section id="tab-dashboard" class="active"><div class="toolbar"><b>Live Status</b> <span id="sync" class="pill">offline</span> <span id="counts" class="muted"></span></div><div class="grid"><div class="card s4"><h3>Machines</h3><div id="cMach" style="font-size:32px;font-weight:900">0</div></div><div class="card s4"><h3>Parts</h3><div id="cPart" style="font-size:32px;font-weight:900">0</div></div><div class="card s4"><h3>History</h3><div id="cHist" style="font-size:32px;font-weight:900">0</div></div></div></section>
<section id="tab-machines"><div class="toolbar"><b>Add / Update Machine</b></div><div class="grid"><div class="s4"><label>Machine No<br><input id="m_no"></label></div><div class="s4"><label>Machine Name<br><input id="m_name"></label></div><div class="s4"><label>Make<br><input id="m_make"></label></div><div class="s12"><button class="ok" id="m_save">Save Machine</button></div></div><div class="table-wrap"><table id="m_table"><thead></thead><tbody></tbody></table></div></section>
<section id="tab-parts"><div class="toolbar"><b>Add / Update Part</b></div><div class="grid"><div class="s3"><label>Item Code<br><input id="p_code"></label></div><div class="s6"><label>Description / Spec<br><input id="p_spec"></label></div><div class="s3"><label>Cost<br><input id="p_cost" type="number"></label></div><div class="s4"><label>Vendor<br><input id="p_vendor"></label></div><div class="s4"><label>Vendor Email<br><input id="p_email"></label></div><div class="s4"><label>Vendor Phone<br><input id="p_phone"></label></div><div class="s12"><button class="ok" id="p_save">Save Part</button></div></div><div class="table-wrap"><table id="p_table"><thead></thead><tbody></tbody></table></div></section>
<section id="tab-history"><div class="toolbar"><b>Add Replacement / Scheduled Activity</b></div><div class="grid"><div class="s3"><label>Machine<br><select id="h_machine"></select></label></div><div class="s3"><label>Item<br><select id="h_item"></select></label></div><div class="s3"><label>Done Date<br><input id="h_date" type="date"></label></div><div class="s3"><label>NextChange<br><input id="h_next" type="date"></label></div><div class="s3"><label>Status<br><select id="h_status"><option>Scheduled</option><option>Done</option></select></label></div><div class="s3"><label>Life Value<br><input id="h_life" type="number"></label></div><div class="s3"><label>Life Unit<br><select id="h_unit"><option>Months</option><option>Days</option><option>Years</option></select></label></div><div class="s3"><label>Cost<br><input id="h_cost" type="number"></label></div><div class="s12"><label>Remarks<br><textarea id="h_remarks"></textarea></label></div><div class="s12"><button class="ok" id="h_save">Save History</button></div></div><div class="table-wrap"><table id="h_table"><thead></thead><tbody></tbody></table></div></section>
<section id="tab-schedule"><div class="toolbar"><b>Upcoming Schedule</b><button class="chip blue" data-n="1">1M</button><button class="chip blue" data-n="3">3M</button><button class="chip blue" data-n="6">6M</button><button class="chip blue" data-n="12">12M</button><span id="sch_status" class="muted"></span></div><div class="table-wrap"><table id="s_table"><thead></thead><tbody></tbody></table></div></section>
<section id="tab-chat"><div class="toolbar"><b>Smart Chat</b><button class="chip green" data-q="due next 6 months">Due 6M</button><button class="chip blue" data-q="top 10 cost next 12 months">Top 10 Cost</button><button class="chip red" data-q="shutdown pending may">May Shutdown</button><button class="chip red" data-q="shutdown pending oct">Oct Shutdown</button><button class="chip red" data-q="shutdown pending dec">Dec Shutdown</button></div><div id="chat-wrap"><div id="chat-body"></div><div style="display:flex;gap:8px;padding:10px;border-top:1px solid #1f2c33"><input id="chat_input" placeholder="Ask: due next 6 months / shutdown pending dec" style="flex:1"><button id="chat_send" class="pri">Send</button></div></div></section>
<section id="tab-backup"><div class="toolbar"><button id="export_json">Download JSON</button><input type="file" id="import_json" accept=".json,application/json"><button id="merge_json" class="ok">Upload/Merge JSON</button><span class="muted">Users can upload/merge. Delete is admin only.</span></div><pre id="debug" class="card"></pre></section>
</main>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
let app, auth, db, user=null, role='user';
let data={machines:{},parts:{},history:{}};
const id=x=>document.getElementById(x);
const uid=()=> 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
const esc=s=>String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function log(m){const d=id('debug'); if(d)d.textContent=String(m)+'
'+d.textContent;}
function initTabs(){document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.setAttribute('aria-selected','false'));b.setAttribute('aria-selected','true');document.querySelectorAll('main section').forEach(s=>s.classList.remove('active'));id('tab-'+b.dataset.tab).classList.add('active'); if(b.dataset.tab==='schedule') buildSchedule(6); if(b.dataset.tab==='chat') bot('bot','Ready. Type due next 6 months or shutdown pending dec.');});}
function initFirebase(){try{app=firebase.initializeApp(window.FIREBASE_CONFIG);auth=firebase.auth();db=firebase.database();id('sync').textContent='firebase ready';}catch(e){id('sync').textContent='config error';alert('Firebase config error: '+e.message);log(e.message);}}
function isFirstAdmin(u){return u&&u.email&&u.email.toLowerCase()===String(window.FIRST_ADMIN_EMAIL||'').toLowerCase();}
async function ensureProfile(u){await db.ref('userProfiles/'+u.uid).update({email:u.email,lastLogin:new Date().toISOString()});const r=await db.ref('userRoles/'+u.uid+'/role').get();role=r.exists()?r.val():(isFirstAdmin(u)?'admin':'user');id('who').textContent=(u.email||u.uid)+' | role: '+role;}
function listen(){db.ref().on('value',snap=>{const v=snap.val()||{};data.machines=v.machines||{};data.parts=v.parts||{};data.history=v.history||{};id('sync').textContent='live';renderAll();},e=>log('DB listen: '+e.message));}
function renderAll(){renderMachines();renderParts();renderHistory();fillSelects();id('cMach').textContent=Object.keys(data.machines).length;id('cPart').textContent=Object.keys(data.parts).length;id('cHist').textContent=Object.keys(data.history).length;id('counts').textContent=' Machines '+id('cMach').textContent+' | Parts '+id('cPart').textContent+' | History '+id('cHist').textContent;}
function canDelete(){return role==='admin';}
function delBtn(path,key){return canDelete()?` <button class="warn" onclick="delRec('${path}','${key}')">Delete</button>`:'';}
function delRec(path,key){if(role!=='admin'){alert('Only admin can delete');return;} if(confirm('Delete?')) db.ref(path+'/'+key).remove();}
function renderMachines(){id('m_table').tHead.innerHTML='<tr><th>Machine</th><th>Name</th><th>Make</th><th>Action</th></tr>';id('m_table').tBodies[0].innerHTML=Object.entries(data.machines).map(([k,m])=>`<tr><td>${esc(m.machineNo)}</td><td>${esc(m.machineName)}</td><td>${esc(m.make)}</td><td><button onclick="editMachine('${k}')">Edit</button>${delBtn('machines',k)}</td></tr>`).join('');}
function renderParts(){id('p_table').tHead.innerHTML='<tr><th>Item Code - Description</th><th>Cost</th><th>Vendor</th><th>Email</th><th>Phone</th><th>Action</th></tr>';id('p_table').tBodies[0].innerHTML=Object.entries(data.parts).map(([k,p])=>`<tr><td><b>${esc(p.itemCode)}</b> - ${esc(p.spec)}</td><td>${esc(p.cost)}</td><td>${esc(p.vendor)}</td><td>${esc(p.vendorEmail)}</td><td>${esc(p.vendorPhone)}</td><td><button onclick="editPart('${k}')">Edit</button>${delBtn('parts',k)}</td></tr>`).join('');}
function renderHistory(){id('h_table').tHead.innerHTML='<tr><th>Date</th><th>NextChange</th><th>Machine</th><th>Item</th><th>Spec</th><th>Status</th><th>Action</th></tr>';id('h_table').tBodies[0].innerHTML=Object.entries(data.history).sort((a,b)=>String(a[1].nextChange||'').localeCompare(String(b[1].nextChange||''))).map(([k,h])=>`<tr><td>${esc(h.date)}</td><td>${esc(h.nextChange)}</td><td>${esc(h.machineNo)}</td><td>${esc(h.itemCode)}</td><td>${esc(h.spec)}</td><td>${esc(h.status)}</td><td>${delBtn('history',k)}</td></tr>`).join('');}
function fillSelects(){id('h_machine').innerHTML=Object.values(data.machines).map(m=>`<option value="${esc(m.machineNo)}">${esc(m.machineNo)} - ${esc(m.machineName||'')}</option>`).join('');id('h_item').innerHTML=Object.values(data.parts).map(p=>`<option value="${esc(p.itemCode)}">${esc(p.itemCode)} - ${esc(p.spec||'')}</option>`).join('');}
function editMachine(k){let m=data.machines[k];id('m_no').value=m.machineNo||'';id('m_name').value=m.machineName||'';id('m_make').value=m.make||'';id('m_no').dataset.key=k;}
function editPart(k){let p=data.parts[k];id('p_code').value=p.itemCode||'';id('p_spec').value=p.spec||'';id('p_cost').value=p.cost||'';id('p_vendor').value=p.vendor||'';id('p_email').value=p.vendorEmail||'';id('p_phone').value=p.vendorPhone||'';id('p_code').dataset.key=k;}
id('m_save').onclick=()=>{let k=id('m_no').dataset.key||id('m_no').value||uid();db.ref('machines/'+k).set({machineNo:id('m_no').value,machineName:id('m_name').value,make:id('m_make').value,updatedBy:user.email,updatedAt:new Date().toISOString()});id('m_no').dataset.key='';};
id('p_save').onclick=()=>{let k=id('p_code').dataset.key||id('p_code').value||uid();db.ref('parts/'+k).set({itemCode:id('p_code').value,spec:id('p_spec').value,cost:id('p_cost').value,vendor:id('p_vendor').value,vendorEmail:id('p_email').value,vendorPhone:id('p_phone').value,updatedBy:user.email,updatedAt:new Date().toISOString()});id('p_code').dataset.key='';};
id('h_save').onclick=()=>{let code=id('h_item').value;let p=Object.values(data.parts).find(x=>x.itemCode===code)||{};let k=uid();db.ref('history/'+k).set({machineNo:id('h_machine').value,itemCode:code,spec:p.spec||'',date:id('h_date').value,nextChange:id('h_next').value,status:id('h_status').value,lifeValue:id('h_life').value,lifeUnit:id('h_unit').value,cost:id('h_cost').value,remarks:id('h_remarks').value,updatedBy:user.email,updatedAt:new Date().toISOString()});};
function nextN(n){let now=new Date(), end=new Date();end.setMonth(end.getMonth()+Number(n));return Object.values(data.history).filter(h=>h.nextChange).map(h=>({h,d:new Date(h.nextChange)})).filter(x=>!isNaN(x.d)&&x.d>=now&&x.d<=end).sort((a,b)=>a.d-b.d).map(x=>x.h);}
function buildSchedule(n=6){let rows=nextN(n);id('sch_status').textContent='Showing next '+n+' months: '+rows.length+' rows';id('s_table').tHead.innerHTML='<tr><th>NextChange</th><th>Machine</th><th>Item</th><th>Spec</th><th>Status</th></tr>';id('s_table').tBodies[0].innerHTML=rows.map(h=>`<tr><td>${esc(h.nextChange)}</td><td>${esc(h.machineNo)}</td><td>${esc(h.itemCode)}</td><td>${esc(h.spec)}</td><td>${esc(h.status)}</td></tr>`).join('');}
document.querySelectorAll('[data-n]').forEach(b=>b.onclick=()=>buildSchedule(b.dataset.n));
const shutdown={may:[5,10,15],oct:[10,15,18],dec:[12,22,30]};
function shutdownPending(key){let y=new Date().getFullYear(),w=shutdown[key],start=new Date(y,w[0]-1,w[1]),end=new Date(y,w[0]-1,w[2]);return Object.values(data.history).filter(h=>h.nextChange&&(String(h.status||'').toLowerCase()==='scheduled'||!h.date)).map(h=>({h,d:new Date(h.nextChange)})).filter(x=>x.d&&!isNaN(x.d)&&(x.d<start||(x.d>=start&&x.d<=end))).sort((a,b)=>a.d-b.d).map(x=>x.h);}
function bot(role,msg){let row=document.createElement('div');row.className='chat-row '+role;let b=document.createElement('div');b.className='bubble '+role;b.innerHTML='<div>'+esc(msg).replace(/
/g,'<br>')+'</div><div class="bubble-meta"><span>'+(role==='user'?'You':'Bot')+'</span><span>'+new Date().toLocaleTimeString().slice(0,5)+'</span></div>';row.appendChild(b);id('chat-body').appendChild(row);id('chat-body').scrollTop=id('chat-body').scrollHeight;}
function ask(q){bot('user',q);q=q.toLowerCase();if(q.includes('shutdown')){let key=q.includes('oct')?'oct':q.includes('dec')?'dec':'may';let r=shutdownPending(key);bot('bot','Shutdown pending '+key.toUpperCase()+': '+r.length+' rows');id('s_table').tHead.innerHTML='<tr><th>NextChange</th><th>Machine</th><th>Item</th><th>Spec</th><th>Status</th></tr>';id('s_table').tBodies[0].innerHTML=r.map(h=>`<tr><td>${esc(h.nextChange)}</td><td>${esc(h.machineNo)}</td><td>${esc(h.itemCode)}</td><td>${esc(h.spec)}</td><td>${esc(h.status)}</td></tr>`).join('');document.querySelector('[data-tab="schedule"]').click();return;}let m=q.match(/next (\d+) months/);let n=m?m[1]:6;buildSchedule(n);bot('bot','Showing due next '+n+' months in Schedule tab.');}
id('chat_send').onclick=()=>{let q=id('chat_input').value.trim();if(q){id('chat_input').value='';ask(q);}};document.querySelectorAll('[data-q]').forEach(b=>b.onclick=()=>ask(b.dataset.q));
id('export_json').onclick=()=>{let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='mmr_backup.json';a.click();};
id('merge_json').onclick=()=>{let f=id('import_json').files[0];if(!f){alert('Choose JSON');return;}let r=new FileReader();r.onload=async()=>{let obj=JSON.parse(r.result);let updates={};['machines','parts','history'].forEach(path=>{let v=obj[path]||{};if(Array.isArray(v)){v.forEach(x=>updates[path+'/'+(x.machineNo||x.itemCode||x.id||uid())]=x);} else Object.entries(v).forEach(([k,x])=>updates[path+'/'+k]=x);});updates['imports/'+uid()]={by:user.email,at:new Date().toISOString()};await db.ref().update(updates);alert('Uploaded / merged');};r.readAsText(f);};
id('login').onclick=()=>auth.signInWithEmailAndPassword(id('email').value.trim(),id('password').value).then(()=>alert('Login success')).catch(e=>alert('Login failed: '+e.message));
id('logout').onclick=()=>auth.signOut();
id('reset').onclick=()=>{let email=id('email').value.trim();if(!email){alert('Enter email first');return;}auth.sendPasswordResetEmail(email).then(()=>alert('Password reset email sent. Check mailbox.')).catch(e=>alert('Reset failed: '+e.message));};
initTabs();initFirebase();auth.onAuthStateChanged(async u=>{user=u;if(!u){id('who').textContent='Not signed in';return;}await ensureProfile(u);listen();});
</script>
</body></html>
