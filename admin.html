<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Honda MMR Admin</title><style>
body{font:14px Segoe UI,Arial;background:#0b1220;color:#e5e7eb;margin:0;padding:16px}.card{background:#0f172a;border:1px solid #24344f;border-radius:14px;padding:12px;margin:10px 0}input,select,button{padding:8px;border-radius:8px;border:1px solid #24344f;background:#111827;color:#e5e7eb}button.pri{background:#60a5fa;color:#06101f;font-weight:900}button.warn{background:#ef4444;color:#fff}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #24344f;text-align:left}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:900px){.grid{grid-template-columns:1fr}}
a{color:#93c5fd}</style></head><body>
<h1>Honda MMR Admin Control</h1><p><a href="index.html">Back to App</a></p>
<div class="card"><input id="email" placeholder="admin email"><input id="password" type="password" placeholder="password"><button id="login" class="pri">Login</button><button id="logout">Logout</button><span id="who"></span></div>
<div class="card"><b>Important:</b> first admin must be created manually in Firebase Realtime Database path <code>userRoles/YOUR_UID/role = admin</code>. After that, admin can promote others here.</div>
<div class="grid"><div class="card"><h2>Users / Roles</h2><table id="users"><thead></thead><tbody></tbody></table></div><div class="card"><h2>Data Control</h2><button class="warn" onclick="clearPath('machines')">Clear Machines</button> <button class="warn" onclick="clearPath('parts')">Clear Parts</button> <button class="warn" onclick="clearPath('history')">Clear History</button><div id="counts"></div></div></div>
<div class="card"><h2>Records Delete</h2><select id="path"><option>machines</option><option>parts</option><option>history</option></select><button onclick="loadRecords()">Load</button><table id="records"><thead></thead><tbody></tbody></table></div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script><script src="firebase-config.js"></script><script>
let app=firebase.initializeApp(window.FIREBASE_CONFIG),auth=firebase.auth(),db=firebase.database(),user=null,role='user';const id=x=>document.getElementById(x);const esc=s=>String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
id('login').onclick=()=>auth.signInWithEmailAndPassword(id('email').value,id('password').value).catch(e=>alert(e.message));id('logout').onclick=()=>auth.signOut();auth.onAuthStateChanged(async u=>{user=u;if(!u){id('who').textContent='Not signed in';return}let r=await db.ref('userRoles/'+u.uid+'/role').get();role=r.val()||'user';id('who').textContent=u.email+' | '+role;if(role!=='admin')alert('You are not admin. Delete/control actions will be blocked by Firebase rules.');listen()});
function listen(){db.ref().on('value',s=>{let v=s.val()||{};renderUsers(v.userProfiles||{},v.userRoles||{});id('counts').innerHTML='<p>Machines: '+Object.keys(v.machines||{}).length+'</p><p>Parts: '+Object.keys(v.parts||{}).length+'</p><p>History: '+Object.keys(v.history||{}).length+'</p>'})}
function renderUsers(p,r){id('users').tHead.innerHTML='<tr><th>UID</th><th>Email</th><th>Role</th><th>Set Role</th></tr>';id('users').tBodies[0].innerHTML=Object.entries(p).map(([uid,x])=>'<tr><td>'+uid+'</td><td>'+esc(x.email)+'</td><td>'+(r[uid]?.role||'user')+'</td><td><select id="role_'+uid+'"><option>user</option><option>admin</option></select> <button onclick="setRole(\''+uid+'\')">Save</button></td></tr>').join('')}
function setRole(uid){let val=id('role_'+uid).value;db.ref('userRoles/'+uid).set({role:val,updatedAt:new Date().toISOString(),updatedBy:user.email}).catch(e=>alert(e.message))}
function clearPath(path){if(confirm('Admin delete all '+path+'?'))db.ref(path).remove().catch(e=>alert(e.message))}
async function loadRecords(){let p=id('path').value;let s=await db.ref(p).get();let v=s.val()||{};id('records').tHead.innerHTML='<tr><th>Key</th><th>Data</th><th>Action</th></tr>';id('records').tBodies[0].innerHTML=Object.entries(v).map(([k,x])=>'<tr><td>'+k+'</td><td><pre>'+esc(JSON.stringify(x,null,2))+'</pre></td><td><button class="warn" onclick="delRec(\''+p+'\',\''+k+'\')">Delete</button></td></tr>').join('')}
function delRec(p,k){if(confirm('Delete '+k+'?'))db.ref(p+'/'+k).remove().then(loadRecords).catch(e=>alert(e.message))}
</script></body></html>
